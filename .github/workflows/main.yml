name: Test MERN App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Frontend Install & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build
          
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Backend Install
        working-directory: ./server  # 👈 Changed from backend to server
        run: |
          npm install
          
      - name: Create env file
        working-directory: ./server  # 👈 Changed from backend to server
        run: |
          echo "PORT=8000" >> .env
          echo "MONGODB_URI=mongodb://localhost:27017/test" >> .env
          echo "JWT_SECRET=test-secret" >> .env
          # Add other env variables as needed
          
      - name: Start Backend Server
        working-directory: ./server  # 👈 Changed from backend to server
        env:
          PORT: 8000
          NODE_ENV: test
        run: |
          # Start server in background
          npm start &
          SERVER_PID=$!
          
          # Wait for server to start
          echo "Waiting for server to start on port 8000..."
          sleep 5
          
          # Check if server is running
          if ps -p $SERVER_PID > /dev/null
          then
            echo "✅ Server started successfully on port 8000"
            
            # Try to curl the server (if you have a health endpoint)
            curl --fail http://localhost:8000/health || echo "⚠️ No health endpoint, but server is running"
            
            # Kill server
            kill $SERVER_PID
            exit 0
          else
            echo "❌ Server failed to start"
            exit 1
          fi
